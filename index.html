<script>

fetch('/public/data/list_comp.json')

  .then(response => response.json())

  .then(data => {

    const table = document.getElementById('partsTable');

    table.innerHTML = `
      <tr>
        <th>Название</th>
        <th>Количество</th>
        <th>Открыть</th>
      </tr>
    `;

    data.forEach(item => {

      table.innerHTML += `
        <tr>
          <td>${item["Название"]}</td>
          <td>${item["Количество"]}</td>
          <td>
            ${item["Открыть"]
              ? `<a href="${item["Открыть"]}" target="_blank">Открыть</a>`
              : '—'}
          </td>
        </tr>
      `;

    });

  });

</script>


 <script src="https://unpkg.com/mammoth/mammoth.browser.min.js"></script>

<script>
fetch('/public/docs/description.docx')
  .then(response => response.arrayBuffer())
  .then(arrayBuffer => mammoth.convertToHtml({ arrayBuffer }))
  .then(result => {
    document.getElementById('description').innerHTML = result.value;
  })
  .catch(error => console.error(error));
</script>

<script>
const parts = {

  pump: {
    target: "0.904m -0.302m -0.310m",
    orbit: "170deg 118deg 1.6m",
    pdf: "pump.pdf"
  },

  heat: {
    target: "0.052m -1.327m -0.332m",
    orbit: "180deg 80deg 2m",
    pdf: "heat.pdf"
  },

  valve: {
    target: "1.128m -1.980m -0.033m",
    orbit: "90deg 75deg 2m",
    pdf: "valve.pdf"
  }

}; 


  
function showPart(name) {

  if (!parts[name]) {
    console.error(`Элемент "${name}" не найден в parts`);
    return;
  }

  const model = document.querySelector("#model");

  model.removeAttribute("auto-rotate");

  model.cameraTarget = parts[name].target;
  model.cameraOrbit = parts[name].orbit;
}


</script>
